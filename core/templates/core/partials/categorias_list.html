{% if categorias %}
<div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
    {% for cat in categorias %}
    <div class="flex items-center justify-between gap-3 p-3 rounded-xl bg-slate-900/40 border border-slate-800">
        <span class="inline-flex items-center gap-2 text-sm text-slate-200 min-w-0">
            <span class="w-3 h-3 rounded-full shrink-0" style="background-color: {{ cat.color_hex }};"></span>
            <span class="truncate">{{ cat.nombre }}</span>
        </span>
        <button type="button"
            hx-post="{% url 'categoria_eliminar' cat.id %}"
            hx-target="#categorias-list"
            hx-swap="innerHTML"
            hx-confirm="¿Eliminar categoría {{ cat.nombre }}?"
            class="text-xs text-rose-400 hover:text-rose-300 shrink-0 px-2 py-1">
            <i class="bi bi-trash"></i>
        </button>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-sm text-slate-500 py-6 text-center rounded-xl border border-dashed border-slate-800">
    Aún no hay categorías en este espacio. Crea una arriba o usa las globales en las reglas.
</p>
{% endif %}
