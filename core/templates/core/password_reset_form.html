{% extends 'base.html' %}

{% block title %}Recuperar contraseña - Fintrack CL{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-md space-y-6">
        <div class="text-center space-y-2">
            <div class="inline-flex p-4 rounded-2xl bg-gradient-to-tr from-teal-500/20 to-emerald-500/10 text-teal-400 mb-2">
                <i class="bi bi-key text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Recuperar contraseña</h1>
            <p class="text-sm text-slate-400">Te enviaremos un enlace a tu email registrado.</p>
        </div>

        <div class="glass p-8 rounded-2xl space-y-5">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email</label>
                    <input type="email" name="email" required
                           class="w-full bg-slate-900/60 border border-slate-700 text-slate-200 text-sm px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500/50">
                </div>
                <button type="submit"
                        class="w-full py-3 px-4 bg-gradient-to-r from-teal-500 to-emerald-500 text-slate-950 font-bold rounded-xl text-sm">
                    Enviar enlace
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-slate-500">
            <a href="{% url 'login' %}" class="text-teal-400 hover:text-teal-300">Volver al login</a>
        </p>
    </div>
</div>
{% endblock %}
