{% extends 'base.html' %}

{% block title %}Iniciar Sesión - Fintrack CL{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-md space-y-6">
        
        <!-- Logo / Header -->
        <div class="text-center space-y-2">
            <div class="inline-flex p-4 rounded-2xl bg-gradient-to-tr from-teal-500/20 to-emerald-500/10 text-teal-400 mb-2">
                <i class="bi bi-wallet2 text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Bienvenido</h1>
            <p class="text-sm text-slate-400">Ingresa tus credenciales para acceder a Fintrack CL</p>
        </div>

        <!-- Formulario de Login -->
        <div class="glass p-8 rounded-2xl space-y-5">
            {% if error %}
            <div class="flex items-center gap-3 p-3.5 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-300 text-sm">
                <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" class="space-y-5">
                {% csrf_token %}

                <!-- Usuario -->
                <div class="space-y-1.5">
                    <label for="id_username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
                        Nombre de usuario
                    </label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input
                            type="text"
                            name="username"
                            id="id_username"
                            autocomplete="username"
                            required
                            placeholder="Tu nombre de usuario"
                            class="w-full bg-slate-900/60 border border-slate-700 text-slate-200 placeholder-slate-600 text-sm pl-10 pr-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500/50 focus:border-teal-500 transition-all"
                        />
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="space-y-1.5">
                    <label for="id_password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
                        Contraseña
                    </label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input
                            type="password"
                            name="password"
                            id="id_password"
                            autocomplete="current-password"
                            required
                            placeholder="Tu contraseña"
                            class="w-full bg-slate-900/60 border border-slate-700 text-slate-200 placeholder-slate-600 text-sm pl-10 pr-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500/50 focus:border-teal-500 transition-all"
                        />
                    </div>
                </div>

                <!-- Botón de Ingreso -->
                <button
                    type="submit"
                    class="w-full py-3 px-4 bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-slate-950 font-bold rounded-xl shadow-lg shadow-teal-500/10 hover:shadow-teal-500/25 hover:scale-[1.01] active:scale-[0.99] transition-all text-sm"
                >
                    <i class="bi bi-box-arrow-in-right mr-2"></i> Ingresar a Fintrack CL
                </button>
            </form>
        </div>

        <!-- Enlace al Admin -->
        <p class="text-center text-xs text-slate-600">
            ¿Eres administrador?
            <a href="/admin/" class="text-slate-500 hover:text-slate-300 underline transition-colors">Panel de Django Admin</a>
        </p>

    </div>
</div>
{% endblock %}
