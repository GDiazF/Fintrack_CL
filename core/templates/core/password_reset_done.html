{% extends 'base.html' %}

{% block title %}Revisa tu correo - Fintrack CL{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-md space-y-6 text-center">
        <div class="inline-flex p-4 rounded-2xl bg-gradient-to-tr from-teal-500/20 to-emerald-500/10 text-teal-400">
            <i class="bi bi-envelope text-4xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-white">Revisa tu correo</h1>
        <p class="text-sm text-slate-400 leading-relaxed">
            Si ese email está registrado, enviamos un enlace para restablecer la contraseña.
            En local sin SMTP, mira la terminal del servidor.
        </p>
        <a href="{% url 'login' %}" class="text-teal-400 hover:text-teal-300 text-sm">Volver al login</a>
    </div>
</div>
{% endblock %}
