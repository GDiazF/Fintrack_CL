{% extends 'base.html' %}

{% block title %}Contraseña actualizada - Fintrack CL{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-md space-y-6 text-center">
        <div class="inline-flex p-4 rounded-2xl bg-gradient-to-tr from-teal-500/20 to-emerald-500/10 text-teal-400">
            <i class="bi bi-check-circle text-4xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-white">Contraseña actualizada</h1>
        <p class="text-sm text-slate-400">Ya puedes iniciar sesión con tu nueva clave.</p>
        <a href="{% url 'login' %}"
           class="inline-flex py-3 px-5 bg-gradient-to-r from-teal-500 to-emerald-500 text-slate-950 font-bold rounded-xl text-sm">
            Ir al login
        </a>
    </div>
</div>
{% endblock %}
